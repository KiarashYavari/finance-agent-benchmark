version: "3.9"

services:

  finance-agent:
    build: .
    image: finance-agent:latest
    container_name: finance-agent

    ports:
      - "9009:9009"

    env_file:
      - ./secrets/secrets.env

    environment:
      GREEN_AGENT_HOST: "0.0.0.0"
      GREEN_AGENT_PORT: "9009"
      DATASET: "/app/data/public.csv"

    volumes:
      # dataset
      - ./data:/app/data:ro

      # models (LLM GGUF)
      - ./tools/models:/app/tools/models:ro

      # runtime cache
      - ./cache:/app/cache

    restart: unless-stopped
